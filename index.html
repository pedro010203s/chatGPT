<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Muscular 3D - Masculino e Feminino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div id="controls">
            <h1>Sistema Muscular 3D</h1>
            <div class="control-group">
                <button id="maleBtn" class="active">Masculino</button>
                <button id="femaleBtn">Feminino</button>
            </div>
            <div class="control-group">
                <button id="playBtn">▶️ Play</button>
                <button id="pauseBtn">⏸️ Pause</button>
                <button id="resetBtn">🔄 Reset</button>
            </div>
            <div class="control-group">
                <label for="rotationSpeed">Velocidade de Rotação:</label>
                <input type="range" id="rotationSpeed" min="0" max="5" step="0.1" value="1">
            </div>
            <div class="muscle-info">
                <h3>Músculos Principais:</h3>
                <ul id="muscleList"></ul>
            </div>
        </div>
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="script.js"></script>
</body>
</html>
