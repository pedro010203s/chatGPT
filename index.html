<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Muscular 3D - Masculino e Feminino</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="container">
        <div id="controls">
            <h1>Sistema Muscular 3D</h1>
            <div class="control-group">
                <button id="maleBtn" class="active">Modelo Masculino</button>
                <button id="femaleBtn">Modelo Feminino</button>
            </div>
            <div class="control-group">
                <button id="playBtn">▶️ Reproduzir Animação</button>
                <button id="pauseBtn">⏸️ Pausar</button>
                <button id="resetBtn">🔄 Resetar</button>
            </div>
            <div class="control-group">
                <label for="speedSlider">Velocidade:</label>
                <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1">
                <span id="speedValue">1.0x</span>
            </div>
            <div class="info">
                <p>Use o mouse para rotacionar, scroll para zoom</p>
            </div>
        </div>
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="script.js"></script>
</body>
</html>
